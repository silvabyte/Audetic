name: Rust

on:
  push:
    branches: ["main", "beta"]
  pull_request:
    branches: ["main", "beta"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install system deps (ALSA headers + ffmpeg)
        # ffmpeg is needed by the compression pipeline that the meeting and
        # transcribe integration tests exercise; Ubuntu's package is built with
        # libmp3lame so `-codec:a libmp3lame` works.
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libxkbcommon-dev ffmpeg
      - name: Install bun
        uses: oven-sh/setup-bun@v2
      - name: Install web-ui dependencies
        run: cd apps/web-ui && bun install
      - name: Typecheck web-ui
        run: cd apps/web-ui && bun run typecheck
      - name: Build
        # `bun` is on PATH, so crates/audetic/build.rs runs `bun run build`
        # in apps/web-ui and the real dist/ is embedded via include_dir!.
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
