appId: com.audetic.desktop
productName: Audetic
copyright: Copyright (c) Mat Silva

# Outputs to apps/ui/release/, gitignored already.
directories:
  output: release
  buildResources: build

files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
  - package.json

# The bundled daemon is staged by scripts/build-daemon.ts into resources/bin/
# under a per-arch suffix; electron-builder copies this whole tree into the
# packaged app so the runtime can resolve `${process.resourcesPath}/bin/audetic-${arch}`.
extraResources:
  - from: resources/bin
    to: bin
    filter:
      - "**/*"
  - from: resources/audetic.service.tmpl
    to: audetic.service.tmpl

# AppImage + .deb cover Arch (AppImage), Debian/Ubuntu (deb), and most other
# desktop distros. RPM/Flatpak/Snap deferred until there's demand.
linux:
  category: AudioVideo
  executableName: audetic-ui
  synopsis: Voice-to-text desktop companion for the Audetic daemon
  description: |
    Electron + React desktop UI for the Audetic voice-to-text daemon.
    Bundles the daemon binary and onboards the user into installing it
    as a systemd user service so global hotkeys (Super+R / Super+Shift+R)
    work even with the window closed.
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  desktop:
    entry:
      Name: Audetic
      Comment: Voice-to-text desktop UI
      Categories: AudioVideo;Audio;Utility;
      StartupNotify: "true"

# Debian dependency closure — must include the same shared libraries the
# daemon itself links against, since we ship that binary too. Mirrors what
# the curl-bash daemon expects on first launch.
deb:
  depends:
    - libasound2
    - libxkbcommon0
    - libgtk-3-0
    - libnss3
    - libsecret-1-0

# Phase 7 fills in the mac block (signing identity Z25737G79K, notarization,
# entitlements). Keeping the key here as a placeholder so the file's shape
# matches the final state and we can spot drift.
