# electron-updater publishes via GitHub Releases. The build also emits
# latest-linux.yml / latest-mac.yml manifests alongside the AppImage / DMG;
# autoUpdater fetches those on next launch to detect new versions.
publish:
  provider: github
  owner: silvabyte
  repo: Audetic
  releaseType: release
